<section class="brands-section">
  <div class="container">
    <div class="header-content">
      <h2 class="title">Trusted by <span>Industry Leaders</span></h2>
    </div>

    <div class="brand-wrapper">
      @if (isDesktop) {
        <div class="brand-grid">
          @for (img of brands; track $index) {
            <div class="brand-item">
              <img [src]="img" [alt]="'Brand ' + $index" class="brand-logo" />
            </div>
          }
        </div>
      } @else {
        <div class="slider">
          <div class="slide-track">
            @for (img of brands.concat(brands); track $index) {
              <div class="slide">
                <img [src]="img" [alt]="'Brand ' + $index" class="brand-logo" />
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
